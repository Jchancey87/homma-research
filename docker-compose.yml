services:
  postgres:
    image: postgres:18
    container_name: trading-journal-db
    environment:
      POSTGRES_DB: trading_journal
      POSTGRES_USER: journal
      POSTGRES_PASSWORD: journal
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journal -d trading_journal"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: trading-journal-backend
    volumes:
      - ./storage:/app/../storage
      - ./backend/.env:/app/.env
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://journal:journal@postgres:5432/trading_journal
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    container_name: trading-journal-frontend
    ports:
      - "3030:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  storage:
