services:
  backend:
    build: ./backend
    container_name: trading-journal-backend
    volumes:
      - ./data:/app/../data
      - ./storage:/app/../storage
      - ./backend/.env:/app/.env
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: trading-journal-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
  storage:
